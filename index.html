<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AshokaManas - Mental Health Support</title>

    <!-- PWA Requirements (Play Store Wrap) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#065F46" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('AshokaManas SW registered successfully!', reg.scope))
            .catch(err => console.error('AshokaManas SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
